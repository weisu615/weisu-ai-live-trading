      <stop offset="0" stop-color="#08090b"/>
      <stop offset="0.45" stop-color="#101316"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" x2="1">
      <stop offset="0" stop-color="#d7a84f" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f3d694"/>
      <stop offset="1" stop-color="#d7a84f" stop-opacity="0"/>
